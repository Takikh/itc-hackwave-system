spring:
    application:
        name: hackwave
    datasource:
        url: jdbc:mariadb://localhost:3306/itc-hackwave
        username: root
        password: root
        driver-class-name: org.mariadb.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: drop-and-create
        database-platform: org.hibernate.dialect.MariaDBDialect
        show-sql: true
        properties:
            hibernate:
            "[format_sql]": true

logging:
  level:
    root: INFO
